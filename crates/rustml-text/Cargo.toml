[package]
name = "rustml-text"
version = "0.1.0"
edition = "2021"
description = "Text feature extraction (CountVectorizer, TfidfVectorizer, HashingVectorizer) for RustML"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sipemu/rustml"
documentation = "https://docs.rs/rustml-text"
readme = "../../README.md"
keywords = ["machine-learning", "text", "tfidf", "nlp", "ndarray"]
categories = ["science", "text-processing"]
rust-version = "1.70"

[dependencies]
rustml-core = { path = "../rustml-core" }
ndarray = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
