[package]
name = "rustml"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
readme = "../../README.md"
rust-version.workspace = true
authors.workspace = true
description = "scikit-learn-style machine learning umbrella crate — re-exports every rustml-* subcrate under a single API"
documentation = "https://docs.rs/rustml"
keywords = ["machine-learning", "ml", "scikit-learn", "classification", "regression"]
categories = ["science", "algorithms"]

[dependencies]
rustml-core = { workspace = true }
rustml-metrics = { workspace = true }
rustml-preprocessing = { workspace = true }
rustml-neighbors = { workspace = true }
rustml-trees = { workspace = true }
rustml-ensemble = { workspace = true }
rustml-cluster = { workspace = true }
rustml-naive-bayes = { workspace = true }
rustml-discriminant = { workspace = true }
rustml-text = { workspace = true }
rustml-gaussian-process = { workspace = true }
rustml-manifold = { workspace = true }
rustml-io = { workspace = true }
rustml-svm = { workspace = true }
rustml-neural-networks = { workspace = true }
rustml-regression = { workspace = true }
rustml-linear = { workspace = true }
ndarray = { workspace = true }
num-traits = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
approx = { workspace = true }
rand = { workspace = true }

[[bench]]
name = "benchmarks"
harness = false

[dev-dependencies.criterion]
version = "0.5"
features = ["html_reports"]
