[package]
name = "rustml"
version = "0.1.0"
edition = "2021"
description = "A scikit-learn-inspired machine learning library for Rust, built on ndarray"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sipemu/rustml"
documentation = "https://docs.rs/rustml"
readme = "../../README.md"
keywords = ["machine-learning", "ml", "scikit-learn", "classification", "regression"]
categories = ["science", "algorithms"]
rust-version = "1.70"

[dependencies]
rustml-core = { path = "../rustml-core" }
rustml-metrics = { path = "../rustml-metrics" }
rustml-preprocessing = { path = "../rustml-preprocessing" }
rustml-neighbors = { path = "../rustml-neighbors" }
rustml-trees = { path = "../rustml-trees" }
rustml-ensemble = { path = "../rustml-ensemble" }
rustml-cluster = { path = "../rustml-cluster" }
rustml-naive-bayes = { path = "../rustml-naive-bayes" }
rustml-discriminant = { path = "../rustml-discriminant" }
rustml-io = { path = "../rustml-io" }
rustml-svm = { path = "../rustml-svm" }
rustml-neural-networks = { path = "../rustml-neural-networks" }
rustml-regression = { path = "../rustml-regression" }
rustml-linear = { path = "../rustml-linear" }
ndarray = { workspace = true }
num-traits = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
approx = { workspace = true }
rand = { workspace = true }

[[bench]]
name = "benchmarks"
harness = false

[dev-dependencies.criterion]
version = "0.5"
features = ["html_reports"]
