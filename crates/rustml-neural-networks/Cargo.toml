[package]
name = "rustml-neural-networks"
version = "0.1.0"
edition = "2021"
description = "Multi-layer perceptron neural networks for the RustML library"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sipemu/rustml"
documentation = "https://docs.rs/rustml-neural-networks"
readme = "../../README.md"
keywords = ["machine-learning", "neural-network", "mlp", "deep-learning", "ndarray"]
categories = ["science", "algorithms"]
rust-version = "1.70"

[dependencies]
rustml-core = { path = "../rustml-core" }
ndarray = { workspace = true }
num-traits = { workspace = true }
serde = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
proptest = { workspace = true }
