[package]
name = "rustml-neighbors"
version = "0.1.0"
edition = "2021"
description = "K-nearest neighbors classifiers and regressors with KD-tree for the RustML library"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sipemu/rustml"
documentation = "https://docs.rs/rustml-neighbors"
readme = "../../README.md"
keywords = ["machine-learning", "knn", "classification", "regression", "ndarray"]
categories = ["science", "algorithms"]
rust-version = "1.70"

[dependencies]
rustml-core = { path = "../rustml-core" }
ndarray = { workspace = true }
num-traits = { workspace = true }
rayon = { workspace = true }
serde = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
proptest = { workspace = true }
