[package]
name = "rustml-trees"
version = "0.1.0"
edition = "2021"
description = "CART decision tree classifiers and regressors for the RustML machine learning library"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sipemu/rustml"
documentation = "https://docs.rs/rustml-trees"
readme = "../../README.md"
keywords = ["machine-learning", "decision-tree", "cart", "classification", "regression"]
categories = ["science", "algorithms"]
rust-version = "1.70"

[dependencies]
rustml-core = { path = "../rustml-core" }
ndarray = { workspace = true }
num-traits = { workspace = true }
serde = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
proptest = { workspace = true }
