[package]
name = "rustml-preprocessing"
version = "0.1.0"
edition = "2021"
description = "Feature preprocessing, scaling, and PCA for the RustML machine learning library"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sipemu/rustml"
documentation = "https://docs.rs/rustml-preprocessing"
readme = "../../README.md"
keywords = ["machine-learning", "preprocessing", "pca", "scaler", "ndarray"]
categories = ["science", "algorithms"]
rust-version = "1.70"

[dependencies]
rustml-core = { path = "../rustml-core" }
ndarray = { workspace = true }
num-traits = { workspace = true }
serde = { workspace = true }
faer = "0.23"
rand = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
proptest = { workspace = true }
