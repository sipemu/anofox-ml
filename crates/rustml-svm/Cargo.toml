[package]
name = "rustml-svm"
version = "0.1.0"
edition = "2021"
description = "Support Vector Machine classifiers for the RustML machine learning library"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sipemu/rustml"
documentation = "https://docs.rs/rustml-svm"
readme = "../../README.md"
keywords = ["machine-learning", "svm", "classification", "support-vector-machine", "ndarray"]
categories = ["science", "algorithms"]
rust-version = "1.70"

[dependencies]
rustml-core = { path = "../rustml-core" }
ndarray = { workspace = true }
num-traits = { workspace = true }
serde = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
approx = { workspace = true }
