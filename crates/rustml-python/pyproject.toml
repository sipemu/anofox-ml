[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "rustml-python"
version = "0.1.0"
description = "Python bindings for the RustML machine learning library"
requires-python = ">=3.9"
license = "MIT OR Apache-2.0"

[tool.maturin]
features = ["pyo3/extension-module"]
