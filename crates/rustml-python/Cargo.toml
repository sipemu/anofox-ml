[package]
name = "rustml-python"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
# Not published on crates.io — this is a PyO3 cdylib extension module built
# with maturin, not a normal Rust crate.
publish = false

[lib]
name = "rustml_python"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28", features = ["extension-module"] }
numpy = "0.28"
ndarray = { workspace = true }
rustml-core = { workspace = true }
rustml-preprocessing = { workspace = true }
rustml-neighbors = { workspace = true }
rustml-trees = { workspace = true }
rustml-ensemble = { workspace = true }
rustml-cluster = { workspace = true }
rustml-naive-bayes = { workspace = true }
rustml-metrics = { workspace = true }
rustml-svm = { workspace = true }
rustml-neural-networks = { workspace = true }
rustml-manifold = { workspace = true }
rustml-gaussian-process = { workspace = true }
rustml-discriminant = { workspace = true }
serde_json = { workspace = true }
bincode = { workspace = true }
