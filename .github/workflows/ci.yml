name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude rustml-python --all-targets

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, "1.85"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude rustml-python

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    env:
      # Run clippy with its own narrower bar: gate on correctness-class
      # lints (the suspicious / correctness groups) and rustc warnings
      # promoted via -Dwarnings, but allow style / pedantic noise. Fixing
      # the full clippy-pedantic backlog is its own workstream.
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo clippy --workspace --exclude rustml-python --all-targets -- \
            -A clippy::all \
            -W clippy::correctness \
            -W clippy::suspicious \
            -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --exclude rustml-python --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  sklearn-version:
    name: sklearn Version Pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r test_harness/requirements.txt
      - name: Verify exact sklearn version
        run: python test_harness/check_sklearn_version.py

  golden-data:
    name: Golden Data Sync
    runs-on: ubuntu-latest
    needs: sklearn-version
    # Advisory: the diff check trips on float-determinism differences
    # between developer machines (different BLAS / CPU paths) and the
    # CI runner. Keep the job so we still surface accidental drift, but
    # don't fail the workflow on bit-level mismatches.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r test_harness/requirements.txt
      - run: python test_harness/generate_golden_data.py
      - name: Check fixtures unchanged (advisory)
        run: git diff --exit-code crates/rustml/tests/golden_data/

  python-bindings:
    name: Python Bindings Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p rustml-python --release

  bench:
    name: Benchmarks (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo bench --workspace --exclude rustml-python --no-run

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --exclude rustml-python --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Only runs when a GitHub release is published. Gated on the full test
    # matrix so a release tag with a regression doesn't make it to the
    # registry. `rustml-python` is excluded — it's a maturin-built PyO3
    # cdylib that ships through PyPI, not crates.io.
    if: github.event_name == 'release'
    needs: [check, test, clippy, fmt, doc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify release tag matches workspace.package.version
        # Releases must be tagged `v<workspace.package.version>` (e.g. v0.2.0)
        # — otherwise rustml's umbrella crate would pull a different version
        # of its sub-crates than they themselves report. Fails fast before
        # any upload.
        run: |
          set -e
          tag="${GITHUB_REF#refs/tags/}"
          expected="${tag#v}"
          actual=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$expected" != "$actual" ]; then
            echo "::error::release tag '$tag' (-> version $expected) does not match workspace.package.version=$actual"
            exit 1
          fi
          echo "Publishing v$actual"
      - name: Publish (topological order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        # The script walks rustml-core first, then leaf crates, then
        # umbrella, sleeping between uploads to let the crates.io index
        # catch up. Pre-existing versions short-circuit (cargo publish
        # treats a re-upload of the same version as an error, which is the
        # desired behaviour — bump workspace.package.version for a re-run).
        run: scripts/publish.sh --execute
