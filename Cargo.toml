[workspace]
resolver = "2"
members = [
    "crates/rustml-core",
    "crates/rustml-metrics",
    "crates/rustml-preprocessing",
    "crates/rustml-neighbors",
    "crates/rustml-trees",
    "crates/rustml",
]

[workspace.dependencies]
ndarray = { version = "0.16", features = ["serde"] }
num-traits = "0.2"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
approx = "0.5"
